name: CI — PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent_review:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    name: PR Agent — Auto Review
    steps:
      - uses: actions/checkout@v4
      - uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_KEY }}
          config.model: "anthropic/claude-opus-4-6"
          config.model_turbo: "anthropic/claude-sonnet-4-6"
          config.fallback_models: '["anthropic/claude-sonnet-4-6"]'
          config.max_model_tokens: "16384"
          config.auto_review: "true"
          config.auto_describe: "true"
          config.auto_improve: "true"

  pr_agent_commands:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    name: PR Agent — Slash Commands
    steps:
      - uses: actions/checkout@v4
      - uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_KEY }}
          config.model: "anthropic/claude-opus-4-6"
          config.model_turbo: "anthropic/claude-sonnet-4-6"
          config.fallback_models: '["anthropic/claude-sonnet-4-6"]'
          config.max_model_tokens: "16384"
