# Build and publish the cross-org GitHub Actions runner image.
#
# Image: ghcr.io/chillwhales/actions-runner
#
# Tags:
#   On push to main (or weekly/manual):
#     - node22-<short-sha>   (immutable, used for Helm pins)
#     - node22               (rolling)
#     - latest               (rolling)
#   On pull_request touching runner/**:
#     - pr-<number>-<short-sha>   (immutable, scoped to PR for runner smoke-testing)
#     - pr-<number>               (rolling within the PR)
#
# Triggers:
#   - pull_request (same paths)            validate the build + pre-publish PR tag
#   - push to main touching runner/**      promote to canonical tags
#   - weekly cron                          pick up base image security patches
#   - workflow_dispatch                    manual rebuild
name: Runner image

on:
  pull_request:
    paths:
      - 'runner/**'
      - '.github/workflows/runner-image.yml'
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - '.github/workflows/runner-image.yml'
  schedule:
    # Mondays 06:00 UTC — fresh base image weekly
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: runner-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  resolve-runner:
    uses: ./.github/workflows/resolve-runner.yml

  build:
    name: Build and push runner image
    runs-on: ${{ needs.resolve-runner.outputs.heavy }}
    needs: [resolve-runner]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/actions-runner"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              pr="${{ github.event.pull_request.number }}"
              echo "${image}:pr-${pr}-${short_sha}"
              echo "${image}:pr-${pr}"
              echo "pin_tag=pr-${pr}-${short_sha}" >> "$GITHUB_OUTPUT"
            else
              echo "${image}:node22-${short_sha}"
              echo "${image}:node22"
              echo "${image}:latest"
              echo "pin_tag=node22-${short_sha}" >> "$GITHUB_OUTPUT"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: ${{ github.event_name == 'pull_request' && '' || format('type=registry,ref={0}:buildcache,mode=max', steps.tags.outputs.image) }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=GitHub Actions runner with Node 22 + pnpm baked in

      - name: Smoke test image
        run: |
          docker run --rm --entrypoint bash "${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.pin_tag }}" -lc '
            set -euo pipefail
            node --version
            corepack --version
            pnpm --version
            git --version
          '

      - name: Summary
        run: |
          {
            echo "## Runner image published"
            echo ""
            echo "Image: \`${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.pin_tag }}\`"
            echo ""
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              echo "PR-scoped image — pin a runner to this tag to smoke-test before merge:"
            else
              echo "Pin Helm values to the immutable tag:"
            fi
            echo ""
            echo '```yaml'
            echo "image:"
            echo "  repository: ${{ steps.tags.outputs.image }}"
            echo "  tag: ${{ steps.tags.outputs.pin_tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
