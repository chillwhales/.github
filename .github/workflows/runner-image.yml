# Build and publish the cross-org GitHub Actions runner image.
#
# Image: ghcr.io/chillwhales/actions-runner
# Tags published per build:
#   - node22-<short-sha>   (immutable, used for Helm pins)
#   - node22               (rolling)
#   - latest               (rolling)
#
# Triggers:
#   - push to main touching runner/**     (intentional content change)
#   - weekly cron                          (pick up base image security patches)
#   - workflow_dispatch                    (manual rebuild, e.g. pnpm bump)
name: Runner image

on:
  push:
    branches: [main]
    paths:
      - 'runner/**'
      - '.github/workflows/runner-image.yml'
  schedule:
    # Mondays 06:00 UTC — fresh base image weekly
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: runner-image
  cancel-in-progress: false

jobs:
  resolve-runner:
    uses: ./.github/workflows/resolve-runner.yml

  build:
    name: Build and push runner image
    runs-on: ${{ needs.resolve-runner.outputs.heavy }}
    needs: [resolve-runner]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/actions-runner"
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:node22-${short_sha}"
            echo "${image}:node22"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=GitHub Actions runner with Node 22 + pnpm baked in

      - name: Summary
        run: |
          {
            echo "## Runner image published"
            echo ""
            echo "Pin Helm values to the immutable tag:"
            echo ""
            echo '```yaml'
            echo "image:"
            echo "  repository: ${{ steps.tags.outputs.image }}"
            echo "  tag: node22-${GITHUB_SHA::7}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
