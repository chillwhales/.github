name: CI — Changeset Check

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: number
        required: false
        default: 22
      base-branch:
        description: Base branch for changeset comparison
        type: string
        required: false
        default: main

jobs:
  resolve-runner:
    name: Resolve runner
    runs-on: ${{ vars.RUNNER_RESOLVER || 'ubuntu-latest' }}
    outputs:
      heavy: ${{ steps.r.outputs.heavy }}
      light: ${{ steps.r.outputs.light }}
    steps:
      - id: r
        run: |
          echo "heavy=${{ vars.RUNNER_HEAVY || 'self-hosted' }}" >> "$GITHUB_OUTPUT"
          echo "light=${{ vars.RUNNER_LIGHT || 'ubuntu-latest' }}" >> "$GITHUB_OUTPUT"

  changeset-check:
    name: Changeset Check
    runs-on: ${{ needs.resolve-runner.outputs.light }}
    needs: [resolve-runner]
    if: github.event_name == 'pull_request'
    steps:
      - uses: chillwhales/.github/.github/actions/setup-pnpm@main
        with:
          node-version: ${{ inputs.node-version }}
          fetch-depth: 0
      - run: pnpm changeset status --since=origin/${{ inputs.base-branch }}
