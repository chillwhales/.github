name: CI — Quality Checks

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: number
        required: false
        default: 22
      verify-command:
        description: Package verification command (e.g., "pnpm validate:publish")
        type: string
        required: false
        default: ""
      changeset-check:
        description: Whether to run changeset status check on PRs
        type: boolean
        required: false
        default: true
      base-branch:
        description: Base branch for changeset comparison (e.g., "main")
        type: string
        required: false
        default: main

jobs:
  # -------------------------------------------------------------------------
  # Resolve runner — emit heavy/light labels from org/repo vars
  # -------------------------------------------------------------------------
  resolve-runner:
    name: Resolve runner
    runs-on: ${{ vars.RUNNER_RESOLVER || 'ubuntu-latest' }}
    outputs:
      heavy: ${{ steps.r.outputs.heavy }}
      light: ${{ steps.r.outputs.light }}
    steps:
      - id: r
        run: |
          echo "heavy=${{ vars.RUNNER_HEAVY || 'self-hosted' }}" >> "$GITHUB_OUTPUT"
          echo "light=${{ vars.RUNNER_LIGHT || 'ubuntu-latest' }}" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # Package Verify (downloads build artifact from caller workflow)
  # -------------------------------------------------------------------------
  pkg-verify:
    name: Package Verify
    runs-on: ${{ needs.resolve-runner.outputs.light }}
    needs: [resolve-runner]
    if: inputs.verify-command != ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: packages
      - run: ${{ inputs.verify-command }}

  # -------------------------------------------------------------------------
  # Changeset Check (PRs only)
  # -------------------------------------------------------------------------
  changeset-check:
    name: Changeset Check
    runs-on: ${{ needs.resolve-runner.outputs.light }}
    needs: [resolve-runner]
    if: inputs.changeset-check && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm changeset status --since=origin/${{ inputs.base-branch }}
